<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimpleAgent v2.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #60a5fa; --green: #6ee7b7; --red: #fca5a5; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { text-align: center; padding: 16px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 20px; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { font-size: 12px; color: var(--muted); margin-top: 4px; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-break: break-word; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #1d4ed8; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.error { align-self: center; background: #7f1d1d; color: var(--red); font-size: 13px; }
  .msg.system { align-self: center; color: var(--muted); font-size: 12px; font-style: italic; }
  .typing { display: inline-flex; gap: 4px; padding: 8px 0; }
  .typing span { width: 8px; height: 8px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  #input-area { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  #input-area input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 99px; font-size: 14px; outline: none; }
  #input-area input:focus { border-color: var(--accent); }
  #input-area button { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 99px; font-size: 14px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
  #input-area button:hover { opacity: 0.85; }
  #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  .code-block { background: #0f172a; padding: 8px 12px; border-radius: 6px; margin: 4px 0; font-family: 'Cascadia Code', monospace; font-size: 13px; overflow-x: auto; }
</style>
</head>
<body>
<header>
  <h1>🤖 SimpleAgent v2.0</h1>
  <p>AgentBase Protocol · A2A · Multi-Agent · Structured Output</p>
</header>
<div id="chat"></div>
<div id="input-area">
  <input id="user-input" type="text" placeholder="输入消息..." autofocus>
  <button id="send-btn" onclick="sendMessage()">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
let loading = false;

input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || loading) return;

  addMsg('user', text);
  input.value = '';
  loading = true;
  sendBtn.disabled = true;
  addTyping();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    removeTyping();

    if (!resp.ok) {
      const err = await resp.text();
      addMsg('error', `❌ 错误 (${resp.status}): ${err}`);
      return;
    }

    const data = await resp.json();
    addMsg('assistant', data.reply || '(空回复)');
  } catch(e) {
    removeTyping();
    addMsg('error', `❌ 连接失败: ${e.message}\n\n确保 Python 后端正在运行`);
  }

  loading = false;
  sendBtn.disabled = false;
  input.focus();
}

// Auto-connect check
fetch('/api/health')
  .then(r => r.json())
  .then(d => { if (d.ok) addMsg('system', `✅ 已连接 · ${d.agent} v${d.version}`); })
  .catch(() => addMsg('system', '⚠️ 后端未连接，请先运行 python server.py'));

addMsg('system', '💡 SimpleAgent v2.0 — 输入消息开始对话');
</script>
</body>
</html>
