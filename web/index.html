<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimpleAgent v2.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8;
    --accent: #60a5fa; --green: #6ee7b7; --red: #fca5a5;
    --user-bg: #1d4ed8; --user-color: #fff;
    --assistant-bg: #1e293b; --assistant-border: #334155;
  }
  [data-theme="light"] {
    --bg: #f0f2f5; --surface: #ffffff; --border: #e2e8f0;
    --text: #1e293b; --muted: #64748b;
    --accent: #3b82f6; --green: #16a34a; --red: #dc2626;
    --user-bg: #3b82f6; --user-color: #fff;
    --assistant-bg: #ffffff; --assistant-border: #e2e8f0;
  }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; transition: background 0.3s, color 0.3s; }
  header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .header-center { text-align: center; flex: 1; }
  header h1 { font-size: 20px; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  [data-theme="light"] header h1 { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.2s; }
  .theme-toggle:hover { background: var(--surface); }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-break: break-word; white-space: pre-wrap; position: relative; }
  .msg.user { align-self: flex-end; background: var(--user-bg); color: var(--user-color); border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--assistant-bg); border: 1px solid var(--assistant-border); border-bottom-left-radius: 4px; border-left: 3px solid var(--accent); }
  .msg.error { align-self: center; background: #7f1d1d; color: var(--red); font-size: 13px; display: flex; flex-direction: column; gap: 8px; padding: 12px 16px; }
  [data-theme="light"] .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .retry-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: inherit; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; align-self: flex-start; transition: all 0.2s; }
  .retry-btn:hover { background: rgba(255,255,255,0.25); }
  [data-theme="light"] .retry-btn { background: #f1f5f9; border-color: #cbd5e1; color: #475569; }
  [data-theme="light"] .retry-btn:hover { background: #e2e8f0; }
  .msg.system { align-self: center; color: var(--muted); font-size: 12px; font-style: italic; }
  .typing { display: inline-flex; gap: 4px; padding: 8px 0; }
  .typing span { width: 8px; height: 8px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  #input-area { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  #input-area input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 99px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  #input-area input:focus { border-color: var(--accent); }
  #input-area button { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 99px; font-size: 14px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; display: flex; align-items: center; gap: 6px; }
  #input-area button:hover { opacity: 0.85; }
  #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
  .spinner.active { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .code-block { background: #0f172a; padding: 8px 12px; border-radius: 6px; margin: 4px 0; font-family: 'Cascadia Code', monospace; font-size: 13px; overflow-x: auto; }
</style>
</head>
<body>
<header>
  <div class="header-center">
    <h1>🤖 SimpleAgent v2.0</h1>
    <p>AgentBase Protocol · A2A · Multi-Agent · Structured Output</p>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">☀️</button>
</header>
<div id="chat"></div>
<div id="input-area">
  <input id="user-input" type="text" placeholder="输入消息..." autofocus>
  <button id="send-btn" onclick="sendMessage()"><span class="spinner" id="spinner"></span>发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const spinner = document.getElementById('spinner');
let loading = false;

input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});

// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.querySelector('.theme-toggle');
  if (html.getAttribute('data-theme') === 'light') {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  } else {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '🌙';
  }
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addError(text, originalMessage) {
  const div = document.createElement('div');
  div.className = 'msg error';
  const msgSpan = document.createElement('span');
  msgSpan.textContent = text;
  div.appendChild(msgSpan);
  const retryBtn = document.createElement('button');
  retryBtn.className = 'retry-btn';
  retryBtn.textContent = '🔄 重试';
  retryBtn.onclick = () => { chat.removeChild(div); sendMessage(originalMessage); };
  div.appendChild(retryBtn);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage(forceText) {
  const text = forceText || input.value.trim();
  if (!text || loading) return;

  addMsg('user', text);
  input.value = '';
  loading = true;
  sendBtn.disabled = true;
  spinner.classList.add('active');
  addTyping();

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);

    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);

    removeTyping();

    if (!resp.ok) {
      const err = await resp.text();
      addError(`❌ 错误 (${resp.status}): ${err}`, text);
      return;
    }

    const data = await resp.json();
    addMsg('assistant', data.reply || '(空回复)');
  } catch(e) {
    removeTyping();
    if (e.name === 'AbortError') {
      addError(`❌ 请求超时（30秒），请重试`, text);
    } else {
      addError(`❌ 连接失败: ${e.message}\n\n确保 Python 后端正在运行`, text);
    }
  }

  loading = false;
  sendBtn.disabled = false;
  spinner.classList.remove('active');
  input.focus();
}

// Auto-connect check
fetch('/api/health')
  .then(r => r.json())
  .then(d => { if (d.ok) addMsg('system', `✅ 已连接 · ${d.agent} v${d.version}`); })
  .catch(() => addMsg('system', '⚠️ 后端未连接，请先运行 python server.py'));

addMsg('system', '💡 SimpleAgent v2.0 — 输入消息开始对话');
</script>
</body>
</html>
