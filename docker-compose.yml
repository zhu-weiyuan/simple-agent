version: "3.8"

services:
  simple-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-local}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:8080}
    volumes:
      - ./memory:/app/memory
    restart: unless-stopped
